# ============================================================
#  DanmakuHime 配置文件
# ------------------------------------------------------------
#  改完保存，重新运行 python3 run.py 即可生效。
#
#  填写规则：
#    · 文字要用英文双引号包起来，例如  host = "127.0.0.1"
#    · 数字直接写，不要加引号，例如    port = 19216
#    · true / false 用来表示「是 / 否」，全小写、不加引号
#    · # 号开头的是注释，给你看的，程序会忽略
#
#  ⚠ 文件下半部分「高级设置」以 [方括号] 段落开头，新手通常不用动。
#    如果要加普通设置，请加在上半部分、也就是第一个 [方括号] 段落出现之前；
#    否则会被算进那个段落里。
# ============================================================


# ———————————————— 直播间 ————————————————

# 直播间号（B 站直播间网址 live.bilibili.com/ 后面那串数字）
room_id = 1921712061


# ———————————————— 网页服务 ————————————————

# 监听地址，本机访问保持 127.0.0.1 即可
host = "127.0.0.1"
# 网页端口，浏览器打开 http://127.0.0.1:端口/
port = 19216
# 使用哪一套前端（指向 frontends 下的目录，里面要有 index.html 和 frontend_version.json）
# 后端代码在 backend/ 里，前端目录是它「上一层的 frontends/」，所以前缀是 ../
# 换前端只改最后那个目录名；前端与后端的 API 版本必须一致，否则启动会被拒绝
frontend = "../frontends/preprint"


# ———————————————— 输出文件名 ————————————————
# 这些文件都生成在 main.py 所在的目录里，一般不用改

# 弹幕事件流水记录
event_log_file = "DanmakuHime-弹幕事件记录.txt"
# 每场直播结束时的礼物统计
stats_output_file = "DanmakuHime-今日直播礼物统计.txt"
# 登录二维码图片
qr_image_file = "bilibili_login_qr.png"
# 登录凭证（含自动刷新所需信息，请勿外传）
credential_file = "credential.json"
# 运行日志（控制台同样的内容会追加写到这里，方便事后回溯）
log_file = "DanmakuHime-运行日志.txt"


# ============================================================
#  高级设置（不熟悉就保持默认，下面开始都是 [方括号] 段落）
# ============================================================

# ———————————————— 登录与凭证 ————————————————
[advanced]
# 扫码登录时的轮询间隔（秒）
login_poll_interval_seconds = 2
# 登录失败后的重试等待（秒）
login_retry_delay_seconds = 5
# 启动阶段（登录、首次拉取直播间信息）的重试次数：各做 1 次 + 这么多次重试，
# 都失败就用空凭据 / 空直播间信息继续启动，不会卡死
initialization_retries = 3
# 凭证「这么久以内」直接使用（秒），默认 24 小时
credential_load_max_age_seconds = 86400
# 凭证「这么久以内」自动刷新、超过则重新扫码（秒），默认 7 天
credential_refresh_max_age_seconds = 604800

# 服务器推流（SSE）缓冲
# 回放给新进观众的历史事件条数
history_size = 120
# 单个观众的事件队列上限（满了丢最旧的）
subscriber_queue_size = 300
# 心跳间隔（秒），保持连接不被中间网络掐断
sse_heartbeat_seconds = 20

# 断线重连与提示停留
# 断线后多久重连（秒）
reconnect_delay_seconds = 3
# “正在重连”提示在画面上停留多久（秒）
reconnect_notice_dwell_seconds = 12
# 直播结束统计报告停留多久（秒）
stream_end_report_dwell_seconds = 20
# 是否把后端报错转发到页面上显示（排查问题时用）
debug_forward_errors = false
# 报错提示停留多久（秒）
debug_error_dwell_seconds = 30
